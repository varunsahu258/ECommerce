apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: ecommerce-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-discovery
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-discovery
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: ecommerce-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ecommerce-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    rule_files:
      - /etc/prometheus/alerts/alert.rules.yml

    scrape_configs:
      - job_name: auth-service
        static_configs:
          - targets: ['auth-service:4001']
        metrics_path: /metrics

      - job_name: product-service
        static_configs:
          - targets: ['product-service:4002']
        metrics_path: /metrics

      - job_name: order-service
        static_configs:
          - targets: ['order-service:4003']
        metrics_path: /metrics

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod

  alert.rules.yml: |
    groups:
      - name: ecommerce-alerts
        rules:
          - alert: HighCheckoutFailureRate
            expr: sum(rate(order_service_checkout_failure_total[5m])) > 0.2
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: Checkout failure rate is elevated
              description: Failed checkout attempts are above the expected demo threshold.

          - alert: ElevatedApiLatency
            expr: (
              sum(rate(order_service_http_request_duration_seconds_sum[5m]))
              /
              sum(rate(order_service_http_request_duration_seconds_count[5m]))
            ) > 1
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: order-service latency is high
              description: Average order-service latency has been above 1 second for 3 minutes.

          - alert: PodRestartsDetected
            expr: increase(kube_pod_container_status_restarts_total[10m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Pod restart detected
              description: One or more pods restarted in the last 10 minutes.
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ecommerce-demo
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ecommerce-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config
              mountPath: /etc/prometheus/alerts/alert.rules.yml
              subPath: alert.rules.yml
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: ecommerce-demo
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: ecommerce-demo
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: ECommerce
        folder: ECommerce
        type: file
        options:
          path: /var/lib/grafana/dashboards
  ecommerce-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "id": null,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(order_service_checkout_success_total[5m]))",
              "refId": "A"
            }
          ],
          "title": "Checkout Success",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "id": 2,
          "targets": [
            {
              "expr": "sum(rate(order_service_checkout_failure_total[5m]))",
              "refId": "A"
            }
          ],
          "title": "Checkout Failure",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "id": 3,
          "targets": [
            {
              "expr": "sum(rate(auth_service_auth_failures_total[5m]))",
              "refId": "A"
            }
          ],
          "title": "Auth Failures",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 8 },
          "id": 4,
          "targets": [
            {
              "expr": "sum(rate(order_service_http_request_duration_seconds_sum[5m])) / sum(rate(order_service_http_request_duration_seconds_count[5m]))",
              "legendFormat": "order-service",
              "refId": "A"
            },
            {
              "expr": "sum(rate(product_service_http_request_duration_seconds_sum[5m])) / sum(rate(product_service_http_request_duration_seconds_count[5m]))",
              "legendFormat": "product-service",
              "refId": "B"
            },
            {
              "expr": "sum(rate(auth_service_http_request_duration_seconds_sum[5m])) / sum(rate(auth_service_http_request_duration_seconds_count[5m]))",
              "legendFormat": "auth-service",
              "refId": "C"
            }
          ],
          "title": "Service Latency",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["ecommerce"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "ECommerce Overview",
      "uid": "ecommerce-overview",
      "version": 1
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ecommerce-demo
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ecommerce-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yml
              subPath: dashboard.yml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards/ecommerce-overview.json
              subPath: ecommerce-overview.json
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards
          configMap:
            name: grafana-dashboards
